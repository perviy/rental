<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вхід — Адмін панель</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🏠</div>
    <h1 class="auth-title">Адмін панель</h1>
    <p class="auth-subtitle">Введіть облікові дані для входу</p>

    <form id="loginForm" class="auth-form">
      <div class="form-group">
        <label class="form-label">Логін</label>
        <input type="text" id="loginInput" class="form-input" placeholder="admin" required />
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input type="password" id="passwordInput" class="form-input" placeholder="••••••••" required />
      </div>
      <div id="loginError" class="form-error" style="display:none">
        Невірний логін або пароль
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
        Увійти
      </button>
    </form>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
