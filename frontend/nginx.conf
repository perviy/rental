server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client pages
    location = / {
        try_files /client/index.html =404;
    }

    location = /client/apartment.html {
        try_files /client/apartment.html =404;
    }

    # Admin pages
    location = /admin {
        return 301 /admin/login.html;
    }

    location /admin/ {
        try_files $uri $uri/index.html =404;
    }

    # Static assets (css, js)
    location /css/ { expires 7d; }
    location /js/  { expires 7d; }

    # Proxy API requests to Flask backend
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 20m;
    }

    # Error pages
    error_page 404 /client/index.html;
}
